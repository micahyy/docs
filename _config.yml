title: 菜籽猫 CHINA
description: 键盘使用说明
theme: just-the-docs

# 网站地址
url: "https://docs.micah.vip"
baseurl: ""

# GitHub 仓库信息（用于页面底部的编辑链接）
repository: micahyy/docs

# 永久链接格式
permalink: pretty

# 搜索功能
search_enabled: true

# 颜色主题（light 或 dark）
color_scheme: light

# 强制左侧导航栏在所有页面都显示完整菜单
nav_enabled: true

# 辅助功能：让所有页面都继承导航设置
defaults:
  - scope:
      path: ""      # 适用于所有页面
    values:
      layout: default
      nav_enabled: true   # 强制显示导航栏
