site_name: 菜籽猫
site_url: https://micahyy.github.io/docs/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  language: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - extra.css

# 导航栏配置（关键！）
nav:
  - 首页: index.md
  - 使用教程: 使用教程/index.md