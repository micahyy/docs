site_name: 菜籽猫
site_url: https://micahyy.github.io/docs/

# ===== 在这里添加 nav 配置 =====
nav:
  - 首页: index.md
  - 📁PCB:
    - G80-3000: PCB/g80_3000.md
    - 配置: usage/config.md
    - 常见问题: usage/faq.md
  - 开发指南:
    - 概述: dev/overview.md
    - API 参考: dev/api.md
  - 关于: about.md
  
theme:
  name: material
  logo: images/logo.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  language: zh


extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/micahyy"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - "extra.css"

extra_javascript:
  - "javascripts/zoom.js"
# ===== 文件结束，后面不要有任何多余内容 =====