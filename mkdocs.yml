site_name: 菜籽猫
site_url: https://micahyy.github.io/docs/
theme:
  name: material
  logo: images/logo.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  language: zh

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/micahyy"  # ← 加引号

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - "extra.css"  # ← 加引号

extra_javascript:
  - "javascripts/zoom.js"  # ← 加引号