site_name: 菜籽猫
site_url: https://micahyy.github.io/docs/
theme:
  name: material
  features:
    - toc.integrate  # 这个特征是 QMK 风格的标志
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  language: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search