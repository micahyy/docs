site_name: 菜籽猫
site_url: https://micahyy.github.io/docs/
theme:
  name: material
  custom_dir: overrides
  logo: images/logo.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  language: zh

# 在左侧菜单栏上方显示站点名称作为"Logo"
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/micahyy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - extra.css