site_name: 菜籽猫
site_url: https://micahyy.github.io/docs/

# ===== 在这里添加 nav 配置 =====
nav:
  - 首页: index.md
  # - 其他页面: other.md

theme:
  name: material
  logo: images/logo.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  language: zh

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/micahyy"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - "extra.css"

extra_javascript:
  - "javascripts/zoom.js"
# ===== 文件结束，后面不要有任何多余内容 =====