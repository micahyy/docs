# 网站基本信息
site_name: 菜籽猫-客制化键盘  # 例如：My Docs
site_url: https://micahyy.github.io/docs/  # 你的 GitHub Pages 地址

# 主题设置 - 这是核心
theme:
  name: material  # 声明使用 Material 主题
  
  # 以下 features 和 palette 是复现 QMK 风格的关键配置
  features:
    - navigation.tabs    # 将顶级导航显示为标签页
    - navigation.sections # 侧边栏显示为章节
    - navigation.top      # 添加回到顶部按钮
    - toc.integrate       # 将右侧目录集成到左侧导航栏（QMK 特色）
    - search.suggest      # 搜索框显示建议
    - search.highlight    # 搜索结果高亮
  palette:
    # 颜色方案，QMK 使用的是默认的 indigo
    - scheme: default
      primary: indigo
      accent: indigo
  language: zh  # 设置为中文界面

# 扩展 Markdown 语法，以实现 QMK 文档中的提示框等丰富效果
markdown_extensions:
  - admonition  # 提示框（!!! note 这类语法）
  - pymdownx.details # 可折叠的提示框
  - pymdownx.superfences # 代码块嵌套
  - pymdownx.tabbed: # 标签页
      alternate_style: true 